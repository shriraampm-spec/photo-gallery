name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies (Root)
        run: npm install

      - name: Backend - Install and Test
        run: |
          cd backend
          npm install
          # Skip tests if they require a database and secrets are not set
          if [ -n "$MONGO_URI" ]; then
            npm test
          else
            echo "Skipping backend tests as MONGO_URI is not set."
          fi
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Frontend - Install, Test and Build
        run: |
          cd frontend
          npm install
          npm test -- --watchAll=false --passWithNoTests
          npm run build
